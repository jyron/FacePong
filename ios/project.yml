name: FacePong
options:
  bundleIdPrefix: com.facepong
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
  developmentLanguage: en
settings:
  base:
    DEVELOPMENT_TEAM: PKB6KZ8392
    SWIFT_VERSION: "5.0"
    MARKETING_VERSION: "1.0.0"
    CURRENT_PROJECT_VERSION: "21"
    TARGETED_DEVICE_FAMILY: "1"
    CODE_SIGN_STYLE: Automatic
targets:
  FacePong:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: FacePong
        excludes:
          - "Info.plist"
          - "Resources/dev"
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.facepong.app
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ENABLE_PREVIEWS: YES
        CODE_SIGNING_ALLOWED: NO
        TARGETED_DEVICE_FAMILY: "1"   # iPhone only (the rebuild is purely for iPhone)
    info:
      path: FacePong/Info.plist
      properties:
        CFBundleDisplayName: FacePong
        CFBundleShortVersionString: "$(MARKETING_VERSION)"
        CFBundleVersion: "$(CURRENT_PROJECT_VERSION)"
        UILaunchScreen:
          UIColorName: launchBackground
        UIStatusBarHidden: true
        UIViewControllerBasedStatusBarAppearance: false
        ITSAppUsesNonExemptEncryption: false
        UIRequiresFullScreen: true
        NSAppTransportSecurity:
          NSAllowsLocalNetworking: true
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        NSCameraUsageDescription: "FacePong needs the camera so you can snap a selfie to use as your paddle."
        NSPhotoLibraryUsageDescription: "FacePong needs access to your photos so you can use a photo as your paddle."
        UIAppFonts:
          - Bungee-Regular.ttf
          - SpaceGrotesk-Medium.ttf
          - SpaceGrotesk-Bold.ttf
